<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SpeechAI - Speech to Text Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(26, 26, 46, 0.95);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0c0;
            --accent: #6c63ff;
            --accent-2: #ff6584;
            --accent-3: #43e97b;
            --border: rgba(108, 99, 255, 0.2);
            --navbar-bg: rgba(15, 15, 26, 0.98);
            --input-bg: rgba(0, 0, 20, 0.6);
            --shadow: rgba(108, 99, 255, 0.1);
        }

        :root[data-theme="light"] {
            --bg-primary: #f5f7ff;
            --bg-secondary: #eef0ff;
            --bg-card: rgba(255, 255, 255, 0.98);
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a7a;
            --accent: #6c63ff;
            --accent-2: #ff6584;
            --accent-3: #00c853;
            --border: rgba(108, 99, 255, 0.15);
            --navbar-bg: rgba(255, 255, 255, 0.98);
            --input-bg: rgba(240, 244, 255, 0.9);
            --shadow: rgba(108, 99, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-text-size-adjust: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 101, 132, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Navbar */
        .navbar {
            background: var(--navbar-bg) !important;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px 0;
        }

        .navbar-brand {
            color: var(--accent) !important;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            padding: 6px 14px !important;
            border-radius: 20px;
            margin: 0 2px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent) !important;
            background: rgba(108, 99, 255, 0.1);
        }

        /* Theme Toggle */
        .theme-toggle {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            background: rgba(108, 99, 255, 0.2);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            padding-left: 16px;
            padding-right: 16px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeInUp 0.4s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 6px 25px var(--shadow);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn-primary {
            background: var(--accent);
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary:hover, .btn-primary:active {
            background: #5a52d5;
            color: #ffffff;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--accent-2);
            border: none;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-danger:hover, .btn-danger:active {
            background: #e05070;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent-3);
            border: none;
            color: #0a0a1a;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        /* Form Controls */
        .form-control, .form-select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        .form-control:focus, .form-select:focus {
            background: var(--input-bg);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-secondary); opacity: 0.7; }

        /* Typography */
        h1, h2 {
            color: var(--text-primary) !important;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h3, h4, h5 {
            color: var(--text-primary) !important;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        p { color: var(--text-secondary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
        a:hover { color: #5a52d5; }
        hr { border-color: var(--border) !important; margin: 16px 0; }

        /* Tables */
        .table td, .table th {
            border-color: var(--border);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            padding: 12px 16px;
            font-size: 0.9rem;
        }

        .table thead th {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .table tbody tr:hover {
            background: rgba(108, 99, 255, 0.04);
        }

        /* Badge */
        .intent-badge {
            background: rgba(108, 99, 255, 0.12);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Response box */
        .response-box {
            background: rgba(108, 99, 255, 0.04);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 12px;
            padding: 16px;
        }

        /* Note and History items */
        .note-item, .history-item {
            background: rgba(108, 99, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            transition: border-color 0.2s ease;
        }

        .note-item:hover, .history-item:hover {
            border-color: rgba(108, 99, 255, 0.3);
        }

        /* Stat cards */
        .stat-card { text-align: center; padding: 20px 16px; }
        .stat-number {
            font-family: 'Inter', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -1px;
        }
        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; opacity: 0.5; }

        /* Mic pulse animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(108, 99, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0); }
        }
        .mic-pulse { animation: pulse 1.5s infinite; }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar-brand { font-size: 1.1rem; }
            .card { border-radius: 12px; }
            .stat-number { font-size: 1.8rem; }
            h2 { font-size: 1.4rem !important; }
            .btn { font-size: 0.85rem; padding: 9px 18px; }
            .container { padding-left: 12px; padding-right: 12px; }
            .theme-toggle span:last-child { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">SpeechAI</a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <a class="nav-link d-none d-md-block" href="/">Assistant</a>
                <a class="nav-link d-none d-md-block" href="/metrics">ML Metrics</a>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="themeIcon">☀️</span>
                    <span id="themeText">Light</span>
                </button>
            </div>
            <!-- Mobile nav -->
            <div class="d-flex d-md-none gap-2 ms-2">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/metrics">Metrics</a>
            </div>
        </div>
    </nav>

    <div class="container mt-3 pb-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeText').textContent = next === 'dark' ? 'Light' : 'Dark';
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        document.getElementById('themeText').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
    </script>
</body>
</html>
